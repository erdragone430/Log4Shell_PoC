version: '3.8'

services:
  # Log4Shell vulnerable web application
  vulnerable-app:
    build: .
    container_name: log4shell-vulnerable-app
    ports:
      - "8080:8080"
    networks:
      - log4shell-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - JAVA_OPTS=-Dcom.sun.jndi.ldap.object.trustURLCodebase=true -Dcom.sun.jndi.rmi.object.trustURLCodebase=true
    restart: unless-stopped

networks:
  log4shell-net:
    driver: bridge
